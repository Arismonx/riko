name: CI

on:
  push:
    paths-ignore:
      - "*.md"

  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun biome ci

      # - name: Run tests
      #   run: bun test

      - name: Run build
        run: bun run build
